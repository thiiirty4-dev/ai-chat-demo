<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Chat - 智能对话助手</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#212121;color:#ececec;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif;height:100vh;overflow:hidden}
.app{height:100vh;display:flex;flex-direction:column}
header{flex-shrink:0;background:#1a1a1a;border-bottom:1px solid #2a2a2a;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;color:#ececec}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#10a37f,#0d8c6e);display:flex;align-items:center;justify-content:center}
.clear-btn{padding:6px 14px;border:1px solid #424242;border-radius:8px;background:transparent;color:#6b7280;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s}
.clear-btn:hover{color:#ef4444;border-color:#ef4444;background:rgba(239,68,68,0.1)}
.msgs{flex:1;overflow-y:auto;padding:20px 0}
.msgs::-webkit-scrollbar{width:6px}
.msgs::-webkit-scrollbar-thumb{background:#424242;border-radius:3px}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px}
.empty-icon{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,rgba(16,163,127,0.15),rgba(13,140,110,0.15));display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.empty h1{font-size:22px;font-weight:600;margin-bottom:8px}
.empty p{color:#6b7280;font-size:14px;line-height:1.6}
.msg{display:flex;gap:12px;padding:12px 20px;max-width:768px;margin:0 auto;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.avatar{width:32px;height:32px;min-width:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
.msg.user .avatar{background:linear-gradient(135deg,#10a37f,#0d8c6e);color:#fff}
.msg.ai .avatar{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.bubble{max-width:75%;padding:12px 16px;border-radius:16px;font-size:15px;line-height:1.7;word-wrap:break-word}
.msg.user .bubble{background:#10a37f;color:#fff;border-bottom-right-radius:4px}
.msg.ai .bubble{background:#2f2f2f;color:#ececec;border:1px solid #424242;border-bottom-left-radius:4px}
.msg.ai .streaming::after{content:'▍';animation:blink 1s step-end infinite;color:#10a37f}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.loading{display:flex;gap:4px;padding:8px 0}
.loading span{width:8px;height:8px;border-radius:50%;background:#6b7280;animation:dotPulse 1.4s infinite}
.loading span:nth-child(2){animation-delay:.2s}
.loading span:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.bottom{flex-shrink:0;border-top:1px solid #2a2a2a;padding:16px 20px}
.input-wrap{max-width:768px;margin:0 auto;display:flex;align-items:flex-end;gap:10px;background:#2f2f2f;border:1px solid #424242;border-radius:12px;padding:10px 14px;transition:border-color .2s}
.input-wrap:focus-within{border-color:#10a37f;box-shadow:0 0 0 1px #10a37f}
.input-wrap textarea{flex:1;border:none;outline:none;background:transparent;color:#ececec;font-size:14px;line-height:1.5;resize:none;max-height:150px;font-family:inherit}
.input-wrap textarea::placeholder{color:#6b7280}
.input-wrap button{width:36px;height:36px;min-width:36px;border:none;border-radius:8px;background:#10a37f;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.input-wrap button:hover:not(:disabled){background:#0d8c6e}
.input-wrap button:disabled{opacity:.4;cursor:not-allowed}
.footer{text-align:center;font-size:12px;color:#6b7280;margin-top:8px}

/* Markdown */
.markdown p{margin-bottom:8px}.markdown p:last-child{margin-bottom:0}
.markdown ul,.markdown ol{padding-left:20px;margin:6px 0}
.markdown li{margin:3px 0}
.markdown h1,.markdown h2,.markdown h3,.markdown h4{font-weight:600;margin:16px 0 8px}.markdown h1{font-size:20px}.markdown h2{font-size:17px}.markdown h3{font-size:15px}
.markdown blockquote{border-left:3px solid #10a37f;padding-left:12px;margin:8px 0;color:#9ca3af}
.markdown code{background:#2a2a2a;padding:2px 6px;border-radius:4px;font-size:13px;font-family:'SF Mono',monospace}
.markdown pre{background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:14px;overflow-x:auto;margin:10px 0}
.markdown pre code{background:transparent;padding:0;font-size:13px;line-height:1.5;color:#e4e4e4}
.markdown table{border-collapse:collapse;width:100%;margin:10px 0;font-size:14px}
.markdown th,.markdown td{border:1px solid #424242;padding:8px 12px;text-align:left}
.markdown th{background:#2a2a2a;font-weight:600}
.markdown a{color:#10a37f;text-decoration:underline}
.markdown hr{border:none;border-top:1px solid #424242;margin:16px 0}
.markdown img{max-width:100%;border-radius:8px;margin:10px 0}

.api-error .bubble{background:#2f1f1f;border-color:#6b3a3a;color:#fca5a5}
.api-error .avatar{background:#6b3a3a!important}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2a4 4 0 0 1 4 4c0 2-2 3-2 4h-4c0-1-2-2-2-4a4 4 0 0 1 4-4z"/><path d="M8 14h8"/><path d="M8 18h8"/><path d="M8 22h8"/><path d="M6 10c-2 1-4 4-4 6 0 2 2 4 6 4"/><path d="M18 10c2 1 4 4 4 6 0 2-2 4-6 4"/></svg>
      </div>
      AI Chat
    </div>
    <button class="clear-btn" id="clearBtn" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      清空对话
    </button>
  </header>

  <div class="msgs" id="msgList">
    <div class="empty" id="emptyState">
      <div class="empty-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#10a37f" stroke-width="1.5"><path d="M12 2a4 4 0 0 1 4 4c0 2-2 3-2 4h-4c0-1-2-2-2-4a4 4 0 0 1 4-4z"/><path d="M8 14h8"/><path d="M8 18h8"/><path d="M8 22h8"/><path d="M6 10c-2 1-4 4-4 6 0 2 2 4 6 4"/><path d="M18 10c2 1 4 4 4 6 0 2-2 4-6 4"/></svg>
      </div>
      <h1>你好！我是 AI 助手</h1>
      <p>我可以帮你回答各种问题、编写代码、解释概念。<br>在下方输入你的问题，开始对话吧。</p>
    </div>
  </div>

  <div class="bottom">
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)"></textarea>
      <button id="sendBtn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="footer">AI 回复仅供参考，请验证重要信息</div>
  </div>
</div>

<script>
// ==============================
// 状态
// ==============================
const state = { messages: [], sending: false, aborted: false };
const $ = s => document.querySelector(s);
const els = { msgList: $('#msgList'), emptyState: $('#emptyState'), input: $('#input'), sendBtn: $('#sendBtn'), clearBtn: $('#clearBtn') };

// ==============================
// 工具
// ==============================
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function scrollBottom() { requestAnimationFrame(() => { els.msgList.scrollTop = els.msgList.scrollHeight; }); }
function autoResize() {
  els.input.style.height = 'auto';
  els.input.style.height = Math.min(els.input.scrollHeight, 150) + 'px';
  els.sendBtn.disabled = !els.input.value.trim() || state.sending;
}

// ==============================
// 消息渲染
// ==============================
function addMsg(msg) {
  const div = document.createElement('div');
  div.className = 'msg ' + msg.role + (msg.error ? ' api-error' : '');
  div.dataset.id = msg.id;
  const avatar = msg.role === 'user' ? '你' : msg.error ? '⚠' : 'AI';
  const content = msg.role === 'user' ? esc(msg.content) : '<div class="markdown">' + (msg.content || '') + '</div>';
  if (msg.error) {
    div.innerHTML = '<div class="avatar">⚠</div><div class="bubble">' + esc(msg.content) + '</div>';
  } else {
    div.innerHTML = '<div class="avatar">' + avatar + '</div><div class="bubble">' + content + '</div>';
  }
  els.msgList.appendChild(div);
  scrollBottom();
  return div;
}

function updMsg(id, html) {
  const el = els.msgList.querySelector('[data-id="' + id + '"]');
  if (el && !el.classList.contains('api-error')) {
    const bubble = el.querySelector('.bubble');
    bubble.innerHTML = '<div class="markdown">' + html + '</div>';
    // 高亮代码块
    bubble.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
    scrollBottom();
  }
}

function showLoading() {
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'loadingMsg';
  div.innerHTML = '<div class="avatar">AI</div><div class="bubble"><div class="loading"><span></span><span></span><span></span></div></div>';
  els.msgList.appendChild(div);
  scrollBottom();
}

function hideLoading() { const el = document.getElementById('loadingMsg'); if (el) el.remove(); }

function toggleEmpty() {
  const has = state.messages.length > 0;
  els.emptyState.style.display = has ? 'none' : 'flex';
  els.clearBtn.style.display = has ? 'flex' : 'none';
}

// ==============================
// 流式渲染
// ==============================
let streamBuf = {};

async function sendMsg() {
  const content = els.input.value.trim();
  if (!content || state.sending) return;

  state.sending = true;
  els.sendBtn.disabled = true;
  els.input.value = '';
  autoResize();

  // 添加用户消息
  const userMsg = { id: 'u_' + Date.now(), role: 'user', content };
  state.messages.push(userMsg);
  addMsg(userMsg);
  toggleEmpty();

  // 显示加载动画
  showLoading();

  const aiId = 'ai_' + Date.now();
  streamBuf[aiId] = '';

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: state.messages.filter(m => !m.error).map(m => ({ role: m.role, content: m.content }))
      })
    });

    if (!r.ok) {
      hideLoading();
      const err = await r.json();
      const errMsg = { id: 'err_' + Date.now(), role: 'assistant', content: err.error || '请求失败', error: true };
      state.messages.push(errMsg);
      addMsg(errMsg);
      toggleEmpty();
      return;
    }

    const rd = r.body.getReader();
    const dec = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await rd.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop() || '';

      for (const line of lines) {
        const t = line.trim();
        if (!t.startsWith('data: ')) continue;
        const d = t.slice(6);
        if (d === '[DONE]') continue;
        try {
          const parsed = JSON.parse(d);
          if (parsed.error) {
            hideLoading();
            const errMsg = { id: 'err_' + Date.now(), role: 'assistant', content: parsed.error, error: true };
            state.messages.push(errMsg);
            addMsg(errMsg);
            toggleEmpty();
            return;
          }
          if (parsed.content) {
            streamBuf[aiId] += parsed.content;
            hideLoading();
            // 首次接收时创建消息元素
            if (!document.querySelector('[data-id="' + aiId + '"]')) {
              const aiMsg = { id: aiId, role: 'assistant', content: '' };
              state.messages.push(aiMsg);
              addMsg(aiMsg);
            }
            // 用 marked 渲染 Markdown
            const html = marked.parse(streamBuf[aiId]);
            updMsg(aiId, html);
          }
        } catch {}
      }
    }
    // 标记消息完成
    state.messages = state.messages.map(m => m.id === aiId ? { ...m, done: true } : m);
    delete streamBuf[aiId];

  } catch (e) {
    hideLoading();
    const errMsg = { id: 'err_' + Date.now(), role: 'assistant', content: '网络错误: ' + e.message, error: true };
    state.messages.push(errMsg);
    addMsg(errMsg);
    toggleEmpty();
  } finally {
    state.sending = false;
    els.sendBtn.disabled = true;
  }
}

// ==============================
// 清空
// ==============================
function clearMsgs() {
  state.messages = [];
  document.querySelectorAll('.msg').forEach(el => el.remove());
  toggleEmpty();
}

// ==============================
// 事件绑定
// ==============================
els.sendBtn.addEventListener('click', sendMsg);
els.clearBtn.addEventListener('click', clearMsgs);
els.input.addEventListener('input', autoResize);
els.input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
</script>
</body>
</html>
